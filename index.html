<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>My Java App</title>
    <script src="https://cjrtnc.leaningtech.com/3.0/loader.js"></script>
  </head>
  <body>
    <script>
      async function startApp() {
        // This waits for the window to be fully ready
        await new Promise(resolve => window.onload = resolve);
        
        if (typeof cheerpjInit !== 'undefined') {
          await cheerpjInit();
          cheerpjCreateDisplay(800, 600);
          cheerpjRunMain("DriverPhys", "/app/KoahlaPhysicsSimsTest2.jar");
        } else {
          console.error("CheerpJ loader failed to load.");
        }
      }   
      startApp();
    </script>
  </body>
</html>
