<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Physics Sim</title>
    <script src="https://cjrtnc.leaningtech.com/4.2/loader.js"></script>
</head>
<body style="margin:0; background:#1a1a1a; color:white; display:flex; flex-direction:column; align-items:center; font-family:sans-serif;">

    <h2 id="status" style="margin-top:20px;">Checking Engine (v4.2)...</h2>
    
    <div id="cheerpj-display" style="width:800px; height:600px; background:#000; border:2px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5);"></div>

    <script>
        async function runSimulation() {
            status.innerText = "Loading Class and Running DriverPhys...";

            // We use "/app/" as the second argument. 
            // This tells CheerpJ to look at your root GitHub folder for .class files.
            await cheerpjRunMain("DriverPhys", "/app/");
            
            status.innerText = "Simulation Active";
        }

        // Start when the page is ready
        window.onload = runSimulation;
    </script>
</body>
</html>
