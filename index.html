<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Physics Sim</title>
    <script type="text/javascript" src="https://cjrtnc.leaningtech.com/3.0/loader.js"></script>
</head>
<body>
    <div id="container"></div>
    <script>
        // Instead of waiting for onload, we check for the function directly
        async function run() {
            if (typeof cheerpjInit !== 'undefined') {
                await cheerpjInit();
                cheerpjCreateDisplay(800, 600);
                await cheerpjRunMain("DriverPhys", "/app/KoahlaPhysicsSimsTest2.jar");
            } else {
                // If it fails, we wait 1 second and try again (polling)
                setTimeout(run, 1000);
            }
        }
        run();
    </script>
</body>
</html>
