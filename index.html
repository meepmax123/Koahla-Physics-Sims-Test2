<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Physics Sim</title>
    <script src="https://cjrtnc.leaningtech.com/3.0/loader.js"></script>
</head>
<body style="margin:0; background-color:#f0f0f0; display:flex; flex-direction:column; align-items:center; font-family:sans-serif;">
    
    <h2 id="status">Waiting for engine...</h2>
    
    <div id="cheerpj-display" style="width:800px; height:600px; border:2px solid #333; background-color:white;"></div>

    <script>
        async function initApp() {
            const status = document.getElementById('status');
            
            // 1. Wait for the loader script to actually be ready
            if (typeof cheerpjInit === 'undefined') {
                status.innerText = "Engine script not ready yet, retrying...";
                setTimeout(initApp, 1000);
                return;
            }

            try {
                status.innerText = "Initializing Engine (may take 20s)...";
                await cheerpjInit();
                
                status.innerText = "Setting up display...";
                cheerpjCreateDisplay(800, 600, document.getElementById('cheerpj-display'));
                
                status.innerText = "Starting DriverPhys...";
                await cheerpjRunMain("DriverPhys", "/app/KoahlaPhysicsSimsTest2.jar");
                
                status.innerText = "App Running!";
            } catch (err) {
                status.innerText = "Error: " + err.message;
                console.error(err);
            }
        }

        // Start the check
        initApp();
    </script>
</body>
</html>
