<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Physics Sim</title>
    <script type="text/javascript" src="https://cjrtnc.leaningtech.com/3.0/loader.js"></script>
</head>
<body style="margin:0; background-color:#f0f0f0; display:flex; flex-direction:column; align-items:center;">
    <h2 id="status">Loading Physics Sim...</h2>
    
    <div id="cheerpj-display" style="width:800px; height:600px; border:2px solid #333; background-color:white;"></div>

    <script>
        async function start() {
            if (typeof cheerpjInit !== 'undefined') {
                document.getElementById('status').innerText = "Initializing Engine...";
                await cheerpjInit();
                
                // Link the Java window to our div
                cheerpjCreateDisplay(800, 600, document.getElementById('cheerpj-display'));
                
                document.getElementById('status').innerText = "Running App...";
                // Start the JAR
                await cheerpjRunMain("DriverPhys", "/app/KoahlaPhysicsSimsTest2.jar");
            } else {
                // Keep checking until loader.js arrives
                setTimeout(start, 500);
            }
        }
        start();
    </script>
</body>
</html>
