<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Physics Sim</title>
    <script src="https://cjrtnc.leaningtech.com/3.0/loader.js"></script>
</head>
<body style="margin:0; background:#222; color:white; display:flex; flex-direction:column; align-items:center; font-family:sans-serif;">

    <h2 id="status" style="margin-top:20px;">Loading Java Engine...</h2>
    
    <div id="cheerpj-display" style="width:800px; height:600px; background:#000; border:2px solid #555;"></div>

    <script>
        async function runSimulation() {
            const status = document.getElementById('status');
            
            try {
                // 1. Check if the script actually loaded
                if (typeof cheerpjInit === 'undefined') {
                    status.innerText = "Error: CheerpJ script blocked by browser.";
                    return;
                }

                // 2. Initialize the engine
                status.innerText = "Engine Found. Initializing Java...";
                await cheerpjInit();
                
                // 3. Create the Java window inside our div
                cheerpjCreateDisplay(800, 600, document.getElementById('cheerpj-display'));
                
                // 4. Run the JAR
                status.innerText = "Starting DriverPhys...";
                await cheerpjRunMain("DriverPhys", "/app/KoahlaPhysicsSimsTest2.jar");
                
                status.innerText = "Physics Sim Active";
            } catch (e) {
                status.innerText = "Error: " + e.message;
                console.error(e);
            }
        }

        // Run the function after the page is fully loaded
        window.addEventListener('load', runSimulation);
    </script>
</body>
</html>
