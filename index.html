<script>
    async function runSimulation() {
        const status = document.getElementById('status');
        
        try {
            status.innerText = "Initializing Engine...";
            // We use 4.2 and enable the console so we can see the 'real' error
            await cheerpjInit({enableNetwork:true, enableConsole:true});
            
            cheerpjCreateDisplay(800, 600, document.getElementById('cheerpj-display'));
            
            status.innerText = "Loading Simulation Archive...";
            
            // "/app/" is the virtual root. 
            // We must point to the JAR so all your classes (Ball, etc.) are found together.
            await cheerpjRunMain("DriverPhys", "/app/KoahlaPhysicsSimsTest2.jar");
            
            status.innerText = "Simulation Active";
        } catch (e) {
            status.innerText = "Java Error: " + e.message;
            console.error("Full Error Details:", e);
        }
    }
    window.onload = runSimulation;
</script>
