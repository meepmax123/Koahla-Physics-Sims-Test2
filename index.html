<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Physics Sim - Individual Files Mode</title>
    <script src="https://cjrtnc.leaningtech.com/4.2/loader.js"></script>
</head>
<body style="margin: 0; overflow: hidden; background-color: black;">

    <div id="status" style="color: white; position: absolute; top: 10px; left: 10px; z-index: 10;">
        Initializing...
    </div>

    <div id="cheerpj-display" style="width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center;"></div>

    <script>
        async function runSimulation() {
            const status = document.getElementById('status');
            try {
                status.innerText = "Initializing Engine (Java 17)...";
                await cheerpjInit({version: 17, enableNetwork: true, enableConsole: true});
                
                // ADJUST THESE NUMBERS: 
                // Set these to the actual internal dimensions of your Java Applet/Frame.
                // If your code uses 800x600, keep it. If it's bigger, increase them.
                cheerpjCreateDisplay(900, 700, document.getElementById('cheerpj-display'));
                
                status.innerText = "Starting DriverPhys...";

                await cheerpjRunMain("DriverPhys", "/app/Koahla-Physics-Sims-Test2/");
                
                // THIS HIDES THE TEXT:
                status.style.display = "none"; 
                
            } catch (e) {
                status.innerText = "Java Error: " + e.message;
                status.style.color = "red";
                console.error(e);
            }
        }
        window.onload = runSimulation;
    </script>
</body>
</html>
