<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Physics Sim</title>
    <script src="https://cjrtnc.leaningtech.com/3.0/loader.js"></script>
</head>
<body>
    <script>
        // We use window.onload to ensure the 'cheerpjInit' variable exists
        window.onload = async function() {
            try {
                if (typeof cheerpjInit !== 'undefined') {
                    await cheerpjInit();
                    cheerpjCreateDisplay(800, 600);
                    // Double check: Is it DriverPhys or DriverPhys.class? (Use just DriverPhys)
                    await cheerpjRunMain("DriverPhys", "/app/KoahlaPhysicsSimsTest2.jar");
                } else {
                    console.error("CheerpJ is not defined. Check your internet or the script URL.");
                    document.body.innerHTML = "<h1>Error: CheerpJ engine could not be loaded.</h1>";
                }
            } catch (e) {
                console.error("Error starting app:", e);
            }
        };
    </script>
</body>
</html>
